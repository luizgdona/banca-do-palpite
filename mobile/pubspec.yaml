name: banca_do_palpite
description: "Bolão de amigos. Placar em tempo real."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1

  # WebSocket
  web_socket_channel: ^2.4.0

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Fonts
  google_fonts: ^6.2.1

  # QR Code
  qr_flutter: ^4.1.0

  # Images
  cached_network_image: ^3.3.1

  # Share
  share_plus: ^9.0.0

  # Confetti
  confetti: ^0.7.0

  # Intl
  intl: ^0.19.0

  # Utils
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/
